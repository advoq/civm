# /run/civm: casa do lock box-wide (docker-heavy) e dos slots de admissao do civm.
# /run e tmpfs (some no boot), entao o usuario do runner (nao-root) NAO consegue
# criar /run/civm em runtime -> civmctl lock --scope docker-heavy falhava com
# "mkdir /run/civm: permission denied" (exit 77), quebrando o job. Este tmpfiles.d
# recria o dir gravavel (sticky 1777, como /tmp) no boot, pre-condicao do lock.
#
# Instalar na box:
#   sudo cp deploy/systemd/civm-rundir.conf /etc/tmpfiles.d/civm-rundir.conf
#   sudo systemd-tmpfiles --create /etc/tmpfiles.d/civm-rundir.conf
#
# Tipo  Caminho     Modo  Dono  Grupo  Idade  Args
d       /run/civm   1777  root  root   -
